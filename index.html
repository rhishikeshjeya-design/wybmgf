<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wybmgf</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen1" class="screen active">
        <h1 class="title">Hi Pretty Baby aka Thiriniya</h1>
        <button class="btn" onclick="nextScreen(2)">Click me</button>
    </div>

    <div id="screen2" class="screen">
        <h1 class="title">Pick an item to bring with you:</h1>
        <div class="icon-panel">
            <div class="choice-icon" onclick="selectIcon('❤️')">❤️</div>
            <div class="choice-icon" onclick="selectIcon('🌹')">🌹</div>
            <div class="choice-icon" onclick="selectIcon('💍')">💍</div>
            <div class="choice-icon" onclick="selectIcon('✨')">✨</div>
        </div>
    </div>

    <div id="screen3" class="screen">
        <h1 class="title">Gorgeous baby, Will You Be My GirlFirend?</h1>
        
        <div id="drag-icon" class="draggable-item">❤️</div>

        <div class="bowls-container">
            <div id="bowl-yes" class="bowl">
                <span class="bowl-label">YES :)</span>
            </div>
            <div id="bowl-no" class="bowl">
                <span class="bowl-label">NO :(</span>
            </div>
        </div>
    </div>

    <div id="screen4" class="screen">
        <h1 class="title">YAYYYYY! ❤️</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
